			<!-- a contact form -->

          <div class="container contact-form">
            <div class="contact-image">
                <img src="pics/rocket-contact.png" alt="rocket_contact">
            </div>
	    <form action="https://formspree.io/f/mjgjrlbe" method="POST">
               <h3>Drop Me a Message</h3>
               <div class="row">
                    <div class="col-xs-6 col-md-12">

                        <div class="form-group">
                            <label for="name">Name:</label>
                            <input type="text" name="name" class="form-control" placeholder="Your Name *" value="" required>
                        </div>
                        <div class="form-group">
                            <label for="age">Age:</label>
                            <input type="number" name="age" class="form-control" placeholder="Your Age *" value="" required>
                        </div>
                        <div class="form-group">
                            <label for="email">E-mail:</label>
                            <input type="email" name="email" class="form-control" placeholder="Your E-mail *" value="" required>
                        </div>                        
                        <div class="form-group">
                            <label for="how-did-you-know-about-my-page">How did you know about my page?</label>
                            <div class="contactform-radiobutton-container">
								<div class="form-check contactform-radiobutton-box">
								  <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault1">
								  <label class="form-check-label" for="flexRadioDefault1">
									From Google
								  </label>
								</div>
								<div class="form-check contactform-radiobutton-box">
								  <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault2" checked>
								  <label class="form-check-label" for="flexRadioDefault2">
									From a friend
								  </label>
								</div>
								<div class="form-check contactform-radiobutton-box">
								  <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault3">
								  <label class="form-check-label" for="flexRadioDefault3">
									From Linkedin
								  </label>
								</div>
								<div class="form-check contactform-radiobutton-box">
								  <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault4">
								  <label class="form-check-label" for="flexRadioDefault4">
									Other
								  </label>
								</div>	
							</div>
                        </div>

                        <div class="form-group">
                            <label for="message">Your message:</label>
                            <textarea name="txtMsg" class="form-control" placeholder="Your Message *" style="width: 100%; height: 150px;" required></textarea>
                        </div>


                        <div class="form-group">
                            <input type="submit" name="btnSubmit" class="btnContact" value="Send Message">
                        </div>

                    </div>


              </div> <!-- the end of <div class="row"> -->
             
            </form>

        </div> <!-- the end of the LEFT SIDEBAR GRID -->

			</main> <!-- the end of the MAIN CONTENT -->
